<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BackLight</title>
    <meta
      name="description"
      content="BackLight is a macOS menu bar utility that dims your screen and follows your cursor with a spotlight."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="hero">
      <div class="hero__content">
        <p class="eyebrow">macOS menu bar utility</p>
        <h1>Light where your cursor is. Focus everywhere else.</h1>
        <p class="lede">
          BackLight adds a fullscreen dimming overlay with a spotlight that tracks
          your mouse along the bottom edge of your display.
        </p>
        <div class="actions">
          <a class="button button--primary" href="#" aria-disabled="true">Download for macOS</a>
          <a class="button button--secondary" href="https://github.com/" target="_blank" rel="noreferrer">
            View updates
          </a>
        </div>
        <p class="meta">macOS 13+ • direct download coming soon</p>
      </div>
      <section class="preview" aria-label="App preview">
        <div class="preview__frame">
          <div class="preview__screen">
            <div class="preview__dim"></div>
            <div class="preview__spotlight"></div>
            <div class="preview__bar"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
